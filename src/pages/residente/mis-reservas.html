<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas - EDIFIKA</title>

    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

    <nav id="sidebar"></nav>

    <main>
        <h1>Mis Reservas</h1>

        <section class="card">
            <h2>Registrar / Editar reserva</h2>

            <form id="formReservaResidente">
                <input type="hidden" id="reservaId">

                <div class="form-group-container">
                    <div class="group">
                        <label for="areaReservaResidente">Área común</label>
                        <select id="areaReservaResidente" required>
                            <option value="">Seleccione un área</option>
                        </select>
                    </div>

                    <div class="group">
                        <label for="fechaReservaResidente">Fecha</label>
                        <input type="date" id="fechaReservaResidente" required>
                    </div>

                    <div class="group" style="justify-content: flex-end;">
                        <button type="submit" class="btn btn-blue">
                            Guardar reserva
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Reservas existentes</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Área</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="tablaReservasExistentes">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2>Reservas registradas</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Área</th>
                            <th>Unidad</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaMisReservas">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../../assets/js/components/sidebar.js"></script>
    <script src="../../assets/js/core/data.js"></script>
    <script src="../../assets/js/pages/reservas.js"></script>
</body>
</html>
