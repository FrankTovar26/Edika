<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuncios - EDIFIKA</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

<nav id="sidebar"></nav>

<main>
    <h1>Anuncios del edificio</h1>

    <section class="card">
        <h2>Muro de anuncios</h2>

        <p style="font-size: 0.9rem; color: #666;">
            Revisa las comunicaciones oficiales publicadas por la administración.
        </p>

        <div style="margin-top: 15px; display: flex; gap: 15px; flex-wrap: wrap;">
            <div>
                <strong id="totalAnunciosPublicados">0</strong>
                <span style="color: #666;">publicados</span>
            </div>

            <div>
                <strong id="totalAnunciosNoLeidos">0</strong>
                <span style="color: #666;">pendientes de lectura</span>
            </div>
        </div>

        <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn btn-blue filtro-anuncio active" data-filtro="todos">
                Todos
            </button>

            <button class="btn filtro-anuncio" data-filtro="noLeidos">
                No leídos
            </button>

            <button class="btn filtro-anuncio" data-filtro="destacados">
                Destacados
            </button>
        </div>
    </section>

    <section id="contenedorAnunciosResidente" style="display: grid; gap: 15px;">
    </section>

    <div style="text-align: center; margin: 20px 0;">
        <button id="btnCargarMasAnuncios" class="btn btn-blue">
            Cargar más
        </button>
    </div>
</main>

<div id="modalDetalleAnuncioResidente" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="cerrarDetalleAnuncioResidente">&times;</span>

        <h2 id="detalleTituloAnuncio"></h2>

        <p id="detalleMetaAnuncio" style="font-size: 0.85rem; color: #666;"></p>

        <div id="detalleContenidoAnuncio" style="margin-top: 15px;"></div>
    </div>
</div>

<script src="../../assets/js/components/sidebar.js"></script>
<script src="../../assets/js/core/data.js"></script>
<script src="../../assets/js/pages/anuncios-residente.js"></script>
</body>
</html>
