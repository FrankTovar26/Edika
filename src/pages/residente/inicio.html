<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Residente - EDIFIKA</title>

    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

    <nav id="sidebar"></nav>

    <main>
        <h1 id="bienvenida">Portal del Residente</h1>

        <section class="stats-grid">
            <div class="card">
                <span class="stat-number" id="totalAreas">0</span>
                <label>Áreas comunes</label>
            </div>

            <div class="card">
                <span class="stat-number" id="totalReservas">0</span>
                <label>Reservas</label>
            </div>

            <div class="card">
                <span class="stat-number">S/ 0.00</span>
                <label>Saldo pendiente</label>
            </div>
        </section>

        <section class="card">
            <h2>Áreas comunes disponibles</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Área</th>
                            <th>Aforo</th>
                            <th>Descripción</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAreasResidente">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2>Mis reservas</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Área</th>
                            <th>Unidad</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="tablaReservasResidente">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2>Avisos</h2>
            <p>No hay avisos registrados por el momento.</p>
        </section>
    </main>

    <script src="../../assets/js/components/sidebar.js"></script>
    <script src="../../assets/js/core/data.js"></script>
    <script src="../../assets/js/pages/residente.js"></script>
</body>
</html>
