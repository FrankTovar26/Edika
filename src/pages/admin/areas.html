<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áreas Comunes - EDIFIKA</title>

    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

    <nav id="sidebar"></nav>

    <main>
        <h1>Gestión de Áreas Comunes</h1>

        <section class="card">
            <h2>Registrar Nueva Área</h2>

            <form id="formArea">
                <div class="form-group-container">
                    <div class="group">
                        <label for="nombreArea">Nombre del Área</label>
                        <input 
                            type="text" 
                            id="nombreArea" 
                            placeholder="Ej: Piscina, SUM, Parrilla" 
                            required
                        >
                    </div>

                    <div class="group">
                        <label for="aforoArea">Aforo Máximo</label>
                        <input 
                            type="number" 
                            id="aforoArea" 
                            placeholder="Ej: 20" 
                            min="1" 
                            required
                        >
                    </div>

                    <div class="group">
                        <label for="descripcionArea">Descripción</label>
                        <input 
                            type="text" 
                            id="descripcionArea" 
                            placeholder="Breve descripción del espacio"
                        >
                    </div>

                    <div class="group">
                        <label for="estadoArea">Estado</label>
                        <select id="estadoArea" required>
                            <option value="disponible">Disponible</option>
                            <option value="no_disponible">No disponible</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-green" style="margin-top: 15px;">
                    Registrar Área
                </button>
            </form>
        </section>

        <section class="card">
            <h2>Áreas Registradas</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Aforo</th>
                            <th>Descripción</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAreas">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card">
            <h2>Registrar / Editar Reserva</h2>

            <form id="formReserva">
                <input type="hidden" id="reservaAdminId">

                <div class="form-group-container">
                    <div class="group">
                        <label for="areaReserva">Seleccionar Área</label>
                        <select id="areaReserva" required>
                            <option value="">Seleccione un área</option>
                        </select>
                    </div>

                    <div class="group">
                        <label for="departamentoReserva">Departamento que solicita</label>
                        <select id="departamentoReserva" required>
                            <option value="">Seleccione unidad</option>
                        </select>
                    </div>

                    <div class="group">
                        <label for="fechaReserva">Fecha</label>
                        <input type="date" id="fechaReserva" required>
                    </div>

                    <div class="group" style="justify-content: flex-end;">
                        <button type="submit" class="btn btn-blue">
                            Guardar Reserva
                        </button>
                    </div>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Reservas Registradas</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Área</th>
                            <th>Unidad</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaReservas">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../../assets/js/components/sidebar.js"></script>
    <script src="../../assets/js/core/data.js"></script>
    <script src="../../assets/js/pages/areas.js"></script>
</body>
</html>
