<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - EDIFIKA</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

<nav class="sidebar">
    <h2>EDIFIKA</h2>
    <div class="sidebar-menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="departamentos.html">🏢 Unidades</a>
        <a href="vinculacion.html">📩 Invitaciones</a>
        <a href="areas.html">🌳 Áreas Comunes</a>
        <a href="config.html" class="active">⚙️ Configuración</a>
        <a href="../residente/inicio.html">🏠 Vista Usuario</a>
        <a href="../../../index.html">🚪 Cerrar sesión</a>
    </div>
</nav>

<main>
    <section class="card">
        <h1>Gestión de Edificios</h1>

        <form id="formEdificio">
            <input type="hidden" id="edificioId">

            <div class="form-group-container">
                <div class="group">
                    <label for="nombreEdificio">Nombre del Edificio</label>
                    <input type="text" id="nombreEdificio" required>
                </div>

                <div class="group">
                    <label for="direccionEdificio">Dirección</label>
                    <input type="text" id="direccionEdificio" required>
                </div>

                <div class="group">
                    <label for="pisosEdificio">Pisos</label>
                    <input type="number" id="pisosEdificio" min="1" required>
                </div>
            </div>

            <button type="submit" class="btn btn-blue" style="margin-top: 15px;">
                Guardar Edificio
            </button>

            <button type="button" id="btnCancelarEdicion" class="btn" style="margin-top: 15px;">
                Cancelar edición
            </button>
        </form>
    </section>

    <section class="card">
        <h2>Edificios Registrados</h2>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Dirección</th>
                        <th>Pisos</th>
                        <th>Estado</th>
                        <th>Fecha creación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaEdificios"></tbody>
            </table>
        </div>
    </section>

    <section class="card">
        <button id="btnLimpiarDB" class="btn btn-red">
            Borrar toda la Base de Datos
        </button>
    </section>
</main>

<script src="../../assets/js/core/data.js"></script>
<script src="../../assets/js/pages/config.js"></script>
</body>
</html>
