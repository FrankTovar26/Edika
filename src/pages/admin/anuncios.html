<body>

        <a href="dashboard.html">🏠 Dashboard</a>

<main>
    <h1>Gestión de Anuncios</h1>

    <section class="card">
        <h2>Crear / Editar anuncio</h2>

        <form id="formAnuncio">
            <input type="hidden" id="anuncioId">

            <div class="form-group-container">
                <div class="group">
                    <label for="tituloAnuncio">Título</label>
                    <input type="text" id="tituloAnuncio" required>
                </div>

                <div class="group">
                    <label for="fechaAnuncio">Fecha</label>
                    <input type="date" id="fechaAnuncio" required>
                </div>
            </div>

            <div class="group" style="margin-top: 10px;">
                <label for="descripcionAnuncio">Descripción</label>
                <textarea 
                    id="descripcionAnuncio" 
                    rows="6" 
                    required
                    style="resize: vertical; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit;"
                ></textarea>
            </div>

            <div class="group" style="margin-top: 10px;">
                <label for="archivoAnuncio">Archivo adjunto PDF/imagen máx. 5 MB</label>
                <input 
                    type="file" 
                    id="archivoAnuncio" 
                    accept=".pdf,image/*"
                >
                <small id="archivoActual" style="color: #666;"></small>
            </div>

            <div style="margin-top: 15px;">
                <button type="button" id="btnGuardarBorrador" class="btn">
                    Guardar borrador
                </button>

                <button type="button" id="btnPublicar" class="btn btn-blue">
                    Publicar
                </button>

                <button type="button" id="btnCancelarEdicion" class="btn btn-red">
                    Cancelar edición
                </button>
            </div>
        </form>
    </section>

    <section class="card">
        <h2>Anuncios registrados</h2>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Título</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Archivo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaAnuncios"></tbody>
            </table>
        </div>
    </section>
</main>

<div id="modalPreviewAnuncio" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="cerrarPreview">&times;</span>
        <h2>Vista previa del anuncio</h2>

        <div id="previewContenido"></div>

        <div style="margin-top: 20px;">
            <button id="btnConfirmarPublicacion" class="btn btn-green">
                Confirmar publicación
            </button>

            <button id="btnCancelarPublicacion" class="btn btn-red">
                Cancelar
            </button>
        </div>
    </div>
</div>

<script src="../../assets/js/core/data.js"></script>
<script src="../../assets/js/pages/anuncios.js"></script>
</body>
</html>
