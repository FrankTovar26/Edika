<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidades - EDIFIKA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>EDIFIKA</h2>
        <div class="sidebar-menu">
            <a href="index.html">🏠 Dashboard</a>
            <a href="departamentos.html" class="active">🏢 Unidades</a>
            <a href="vinculacion.html">📩 Invitaciones</a>
            <a href="areas.html">🌳 Áreas Comunes</a>
            <a href="config.html">⚙️ Configuración</a>
        </div>
    </nav>

    <main>
        <h1>Gestión de Unidades</h1>

        <div class="card">
            <h3>Registrar Nueva Unidad</h3>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 15px;">
                Formato requerido: <strong>Piso-Letra</strong> (Ejemplo: 1-A, 2-B).
            </p>
            <form class="form-group-container" onsubmit="event.preventDefault(); add();">
                <div class="group">
                    <label>N° Depto (Piso-Letra)</label>
                    <input type="text" id="n" placeholder="Ej: 1-A" required 
                           style="text-transform: uppercase;" 
                           autocomplete="off">
                </div>
                <div class="group">
                    <label>Piso Correspondiente</label>
                    <select id="p" required>
                        <option value="">Cargando pisos...</option>
                    </select>
                </div>
                <button class="btn btn-green">+ Registrar</button>
            </form>
        </div>

        <div class="card">
            <h3>Unidades Registradas</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Unidad</th>
                            <th>Piso</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        /**
         * Carga los pisos en el select basándose en la configuración del edificio
         */
        function cargarPisosDisponibles() {
            const db = obtenerTodo();
            const selectPiso = document.getElementById('p');

            if (!db.configEdificio || !db.configEdificio.pisos) {
                alert("⚠️ Debe configurar la cantidad de pisos del edificio primero.");
                window.location.href = "config.html";
                return;
            }

            const maxPisos = parseInt(db.configEdificio.pisos);
            selectPiso.innerHTML = '<option value="">Seleccione piso...</option>';

            for (let i = 1; i <= maxPisos; i++) {
                selectPiso.innerHTML += `<option value="${i}">Piso ${i}</option>`;
            }
        }

        /**
         * Envía los datos a la lógica de data.js
         */
        function add() {
            const numInput = document.getElementById('n').value.trim().toUpperCase();
            const pisoInput = document.getElementById('p').value;

            // Llamada a la función de data.js que contiene las validaciones de negocio
            const res = agregarDepartamento({
                numero: numInput,
                piso: pisoInput
            });

            if (res.ok) {
                render();
                document.getElementById('n').value = '';
                document.getElementById('p').value = '';
                document.getElementById('n').focus();
            } else {
                alert("❌ " + res.error);
            }
        }

        /**
         * Renderiza la tabla de unidades
         */
        function render() {
            const tbody = document.getElementById('lista');
            const db = obtenerTodo();
            
            tbody.innerHTML = '';

            // Ordenar por piso y luego por número para que el admin lo vea organizado
            const deptosOrdenados = db.departamentos.sort((a, b) => {
                if (parseInt(a.piso) !== parseInt(b.piso)) {
                    return parseInt(a.piso) - parseInt(b.piso);
                }
                return a.numero.localeCompare(b.numero);
            });

            deptosOrdenados.forEach(d => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${d.numero}</strong></td>
                        <td>Piso ${d.piso}</td>
                        <td>
                            <button class="btn btn-red" style="padding: 5px 10px;" onclick="del(${d.id})">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                `;
            });

            if (deptosOrdenados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#999;">No hay unidades registradas.</td></tr>';
            }
        }

        /**
         * Eliminar unidad
         */
        function del(id) {
            if (confirm("¿Está seguro de eliminar esta unidad?")) {
                const res = eliminarDepartamento(id);
                if (res.ok) {
                    render();
                } else {
                    alert("❌ " + res.error);
                }
            }
        }

        // Inicialización
        window.onload = function() {
            cargarPisosDisponibles();
            render();
        };
    </script>
</body>
</html>
