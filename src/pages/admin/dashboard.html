<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrador - EDIFIKA</title>

    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>

<nav id="sidebar"></nav>

<main>
    <h1 id="tituloEdificio">Cargando...</h1>

    <section class="stats-grid">
        <div class="card">
            <span class="stat-number" id="totalUnidades">0</span>
            <label>Total unidades</label>
        </div>

        <div class="card">
            <span class="stat-number" id="totalDepartamentos">0</span>
            <label>Departamentos</label>
        </div>

        <div class="card">
            <span class="stat-number" id="totalEstacionamientos">0</span>
            <label>Estacionamientos</label>
        </div>

        <div class="card">
            <span class="stat-number" id="totalDepositos">0</span>
            <label>Depósitos</label>
        </div>

        <div class="card">
            <span class="stat-number" id="totalOficinas">0</span>
            <label>Oficinas / locales</label>
        </div>

        <div class="card">
            <span class="stat-number" id="unidadesOcupadas">0</span>
            <label>Ocupadas</label>
        </div>

        <div class="card">
            <span class="stat-number" id="unidadesDisponibles">0</span>
            <label>Disponibles</label>
        </div>

        <div class="card">
            <span class="stat-number" id="unidadesMantenimiento">0</span>
            <label>Mantenimiento</label>
        </div>

        <div class="card">
            <span class="stat-number" id="porcentajeOcupacion">0%</span>
            <label>Ocupación</label>
        </div>
    </section>

    <section class="card">
        <h2>Filtros</h2>

        <div class="form-group-container">
            <div class="group">
                <label for="filtroBusqueda">Buscar unidad</label>
                <input type="text" id="filtroBusqueda" placeholder="Ej: 1-A, E-01, D-01, OF-101">
            </div>

            <div class="group">
                <label for="filtroPiso">Ubicación / Piso</label>
                <select id="filtroPiso">
                    <option value="">Todos</option>
                </select>
            </div>

            <div class="group">
                <label for="filtroTipo">Tipo de unidad</label>
                <select id="filtroTipo">
                    <option value="">Todos</option>
                    <option value="departamento">Departamento</option>
                    <option value="estacionamiento">Estacionamiento</option>
                    <option value="deposito">Depósito</option>
                    <option value="oficina">Oficina / Local</option>
                </select>
            </div>

            <div class="group">
                <label for="filtroEstado">Estado</label>
                <select id="filtroEstado">
                    <option value="">Todos</option>
                    <option value="disponible">Disponible</option>
                    <option value="ocupada">Ocupada</option>
                    <option value="mantenimiento">En mantenimiento</option>
                    <option value="inactiva">Inactiva</option>
                </select>
            </div>
        </div>
    </section>

    <section class="card">
        <h2>Unidades</h2>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Unidad</th>
                        <th>Ubicación</th>
                        <th>Tipo</th>
                        <th>Vinculación</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaUnidades">
                    <!-- Se llena con JS -->
                </tbody>
            </table>
        </div>
    </section>
</main>

<!-- MODAL DETALLE UNIDAD -->
<div id="modalDetalle" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="cerrarModal">&times;</span>
        <h2>Detalle Unidad</h2>
        <div id="detalleUnidad"></div>
    </div>
</div>

<!-- MODAL PRIMERA CONFIGURACIÓN -->
<div id="modalPrimeraConfiguracion" class="modal">
    <div class="modal-content">
        <h2>Primera configuración requerida</h2>

        <p>
            Aún no tienes edificios configurados o asignados.
            Para usar el sistema EDIFIKA, primero debes registrar la configuración inicial del edificio.
        </p>

        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
            <button class="btn btn-secondary" id="btnCancelarPrimeraConfig">
                Más tarde
            </button>

            <button class="btn btn-blue" id="btnIrPrimeraConfig">
                Configurar edificio
            </button>
        </div>
    </div>
</div>

<script src="../../assets/js/components/sidebar.js"></script>
<script src="../../assets/js/core/data.js"></script>
<script src="../../assets/js/pages/dashboard.js"></script>
</body>
</html>
