<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EDIFIKA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>EDIFIKA</h2>
        <div class="sidebar-menu">
            <a href="index.html" class="active">🏠 Dashboard</a>
            <a href="departamentos.html">🏢 Unidades</a>
            <a href="vinculacion.html">📩 Invitaciones</a>
            <a href="areas.html">🌳 Áreas Comunes</a>
            <a href="config.html">⚙️ Configuración</a>
            <a href="index_u.html">🏠 Vista Usuario</a>
        </div>
    </nav>

    <main>
        <h1 id="ed-nombre" style="margin-bottom: 15px; font-size: 1.5rem;">Cargando...</h1>

        <!-- TARJETAS DE ESTADÍSTICAS SÚPER COMPACTAS -->
        <div class="stats-grid">
            <div class="card">
                <label>Total Unidades</label>
                <span id="t-deptos" class="stat-number">0</span>
            </div>
            <div class="card">
                <label>Ocupadas</label>
                <span id="t-ocupados" class="stat-number" style="color: var(--accent);">0</span>
            </div>
            <div class="card">
                <label>Ocupación</label>
                <span id="p-ocupacion" class="stat-number" style="color: var(--success);">0%</span>
            </div>
        </div>

        <!-- FILTROS COMPACTOS -->
        <div class="card" style="padding: 12px;">
            <div class="form-group-container">
                <div class="group" style="flex: 1;">
                    <label>Piso</label>
                    <select id="f-piso" onchange="render()"></select>
                </div>
                <div class="group" style="flex: 1;">
                    <label>Estado</label>
                    <select id="f-estado" onchange="render()">
                        <option value="todos">Todos</option>
                        <option value="ocupado">Ocupados</option>
                        <option value="vacio">Disponibles</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- TABLA -->
        <div class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Unidad</th>
                            <th>Piso</th>
                            <th>Residente</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL DE DETALLE -->
    <div id="modal-detalle" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <h3 id="m-unidad" style="margin-bottom: 15px; color: var(--primary);">Detalle Unidad</h3>
            <div id="m-contenido" style="font-size: 0.9rem; line-height: 1.6;"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function render() {
            const db = obtenerTodo();
            if(!db.configEdificio) { window.location.href="config.html"; return; }
            
            document.getElementById('ed-nombre').innerText = db.configEdificio.nombre;

            // Select de pisos
            const fPiso = document.getElementById('f-piso');
            if(fPiso.options.length === 0) {
                const pisos = [...new Set(db.departamentos.map(d => d.piso))].sort((a,b)=>a-b);
                fPiso.innerHTML = '<option value="todos">Todos los pisos</option>';
                pisos.forEach(p => fPiso.innerHTML += `<option value="${p}">Piso ${p}</option>`);
            }

            // Estadísticas
            const total = db.departamentos.length;
            const ocupados = db.departamentos.filter(d => d.emailPropietario || d.emailInquilino).length;
            
            document.getElementById('t-deptos').innerText = total;
            document.getElementById('t-ocupados').innerText = ocupados;
            document.getElementById('p-ocupacion').innerText = total > 0 ? ((ocupados/total)*100).toFixed(1) + "%" : "0%";

            // Filtrado
            const filtroPiso = document.getElementById('f-piso').value;
            const filtroEstado = document.getElementById('f-estado').value;

            let filtrados = db.departamentos.filter(d => {
                const cumplePiso = filtroPiso === "todos" || d.piso == filtroPiso;
                const estaOcupado = d.emailPropietario || d.emailInquilino;
                const cumpleEstado = filtroEstado === "todos" || 
                                     (filtroEstado === "ocupado" && estaOcupado) || 
                                     (filtroEstado === "vacio" && !estaOcupado);
                return cumplePiso && cumpleEstado;
            });

            // Tabla
            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            filtrados.forEach(d => {
                const ocupado = d.emailPropietario || d.emailInquilino;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${d.numero}</strong></td>
                        <td>Piso ${d.piso}</td>
                        <td>${d.nombreReal || d.nombreInquilino || "—"}</td>
                        <td><span class="badge ${ocupado ? 'ocupado' : 'vacio'}">${ocupado ? 'Ocupado' : 'Libre'}</span></td>
                        <td><button class="btn btn-blue" style="padding: 4px 8px;" onclick="verDetalle(${d.id})">Info</button></td>
                    </tr>
                `;
            });
        }

        function verDetalle(id) {
            const d = obtenerTodo().departamentos.find(x => x.id === id);
            document.getElementById('m-unidad').innerText = "Detalle: Unidad " + d.numero;
            document.getElementById('m-contenido').innerHTML = `
                <p><strong>Propietario:</strong> ${d.nombreReal || 'N/A'}<br><small>${d.emailPropietario || ''}</small></p>
                <p><strong>Inquilino:</strong> ${d.nombreInquilino || 'N/A'}<br><small>${d.emailInquilino || ''}</small></p>
                <p><strong>Saldo:</strong> $${d.saldo || 0}</p>
            `;
            document.getElementById('modal-detalle').style.display = 'flex';
        }

        function cerrarModal() { document.getElementById('modal-detalle').style.display = 'none'; }
        
        window.onclick = function(e) { if(e.target.className === 'modal') cerrarModal(); }
        window.onload = render;
    </script>
</body>
</html>
