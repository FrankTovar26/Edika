<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EDIFIKA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>EDIFIKA</h2>
        <a href="index.html">🏠 Dashboard</a>
        <a href="departamentos.html">🏢 Unidades</a>
        <a href="vinculacion.html">📩 Invitaciones</a>
        <a href="config.html">⚙️ Configuración</a>
    </nav>
    <main>
        <h1 id="ed-nombre">Panel de Control</h1>
        <div class="stats-grid">
            <div class="card">
                <h3>Total Unidades</h3>
                <p id="t-deptos" style="font-size: 2rem; font-weight: bold;">0</p>
            </div>
            <div class="card">
                <h3>Ocupación</h3>
                <p id="p-ocupacion" style="font-size: 2rem; font-weight: bold; color: var(--accent);">0%</p>
            </div>
            <div class="card">
                <h3>Residentes Activos</h3>
                <p id="t-residentes" style="font-size: 2rem; font-weight: bold; color: var(--success);">0</p>
            </div>
        </div>

        <div class="card">
            <h3>Lista de Residentes</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Unidad</th><th>Piso</th><th>Residente Principal</th><th>Estado</th></tr>
                    </thead>
                    <tbody id="tabla-body"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="data.js"></script>
    <script>
        function actualizarDashboard() {
            const db = obtenerTodo();
            if(!db.configEdificio) window.location.href="config.html";
            
            document.getElementById('ed-nombre').innerText = db.configEdificio.nombre;
            
            const total = db.departamentos.length;
            const ocupados = db.departamentos.filter(d => d.emailPropietario || d.emailInquilino).length;
            const porcentaje = total > 0 ? ((ocupados / total) * 100).toFixed(1) : 0;

            document.getElementById('t-deptos').innerText = total;
            document.getElementById('p-ocupacion').innerText = porcentaje + "%";
            document.getElementById('t-residentes').innerText = ocupados;

            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            db.departamentos.forEach(d => {
                const nombre = d.nombreReal || d.nombreInquilino || "Sin asignar";
                tbody.innerHTML += `
                    <tr>
                        <td>${d.numero}</td>
                        <td>${d.piso}</td>
                        <td>${nombre}</td>
                        <td><span class="badge ${d.emailPropietario ? 'vacio' : 'ocupado'}">
                            ${d.emailPropietario ? 'Vinculado' : 'Disponible'}
                        </span></td>
                    </tr>`;
            });
        }
        window.onload = actualizarDashboard;
    </script>
</body>
</html>
