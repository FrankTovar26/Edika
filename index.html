<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - EDIFIKA</title>

    <link rel="stylesheet" href="src/assets/css/style.css">
</head>
<body class="login-body">

    <main class="auth-container">

        <section id="loginView" class="card auth-card">
            <h1>EDIFIKA</h1>
            <h2>Acceso al sistema</h2>

            <form id="loginForm">
                <div class="group">
                    <label for="emailLogin">Correo</label>
                    <input type="email" id="emailLogin" required>
                </div>

                <div class="group">
                    <label for="passwordLogin">Clave</label>
                    <input type="password" id="passwordLogin" required>
                </div>

                <button type="submit" class="btn btn-blue auth-btn">
                    Entrar
                </button>
            </form>

            <button type="button" id="showRegisterBtn" class="btn auth-link">
                Activar cuenta
            </button>
        </section>

        <section id="registerView" class="card auth-card hidden">
            <h1>EDIFIKA</h1>
            <h2>Activar cuenta</h2>

            <form id="registerForm">
                <div class="group">
                    <label for="registerEmail">Correo de invitación</label>
                    <input type="email" id="registerEmail" required>
                </div>

                <div class="group">
                    <label for="registerName">Nombre</label>
                    <input type="text" id="registerName" required>
                </div>

                <div class="group">
                    <label for="registerDni">DNI</label>
                    <input type="text" id="registerDni" required>
                </div>

                <div class="group">
                    <label for="registerPassword">Nueva clave</label>
                    <input type="password" id="registerPassword" required>
                </div>

                <button type="submit" class="btn btn-green auth-btn">
                    Activar
                </button>
            </form>

            <button type="button" id="showLoginBtn" class="btn auth-link">
                Volver al login
            </button>
        </section>

    </main>

    <script src="src/assets/js/core/data.js"></script>
    <script src="src/assets/js/core/auth.js"></script>
</body>
</html>
