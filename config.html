<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración - EDIFIKA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <h2>EDIFIKA</h2>
        <div class="sidebar-menu">
            <a href="index.html">🏠 Dashboard</a>
            <a href="departamentos.html">🏢 Unidades</a>
            <a href="vinculacion.html">📩 Invitaciones</a>
            <a href="areas.html">🌳 Áreas Comunes</a>
            <a href="config.html" class="active">⚙️ Configuración</a>
        </div>
    </nav>
    <main>
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h1>Configuración</h1>
            <form onsubmit="event.preventDefault(); save();">
                <div class="group">
                    <label>Nombre del Edificio</label>
                    <input type="text" id="n" required>
                </div>
                <div class="group">
                    <label>Dirección</label>
                    <input type="text" id="d" required>
                </div>
                <div class="group">
                    <label>Pisos</label>
                    <input type="number" id="p" required>
                </div>
                <button class="btn btn-blue" style="width: 100%; margin-top: 20px;">Guardar Edificio</button>
            </form>
            <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">
            <button class="btn btn-red" onclick="limpiarDB()" style="width: 100%;">Borrar toda la Base de Datos</button>
        </div>
    </main>
    <script src="data.js"></script>
    <script>
        const db = obtenerTodo();
        if(db.configEdificio){
            document.getElementById('n').value = db.configEdificio.nombre;
            document.getElementById('d').value = db.configEdificio.direccion;
            document.getElementById('p').value = db.configEdificio.pisos;
        }
        function save(){
    const nuevoPiso = document.getElementById('p').value;
    const validacion = validarCambioPisos(nuevoPiso);

    if(!validacion.ok) {
        alert(validacion.error);
        return; // Detiene el guardado
    }

    guardarConfiguracionEdificio({
        nombre: document.getElementById('n').value, 
        direccion: document.getElementById('d').value, 
        pisos: nuevoPiso
    });
    window.location.href="index.html";
}
    </script>
</body>
</html>
