<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración - EDIFIKA</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>
    <nav class="sidebar">
        <h2>Admin</h2>
        <a href="index.html">Dashboard</a>
        <a href="departamentos.html">Departamentos</a>
    </nav>
    <main>
        <h1>Alta / Edición del Edificio</h1>
        <div class="card">
            <form id="form-edificio">
                <div style="margin-bottom: 15px;">
                    <label>Nombre del Edificio:</label><br>
                    <input type="text" id="nombre" required style="width: 100%;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Dirección:</label><br>
                    <input type="text" id="direccion" required style="width: 100%;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Cantidad de Pisos:</label><br>
                    <input type="number" id="pisos" required style="width: 100%;">
                </div>
                <button type="submit" class="btn btn-blue">Guardar Información</button>
            </form>
        </div>
    </main>
    <script src="data.js"></script> <script>
        const db = obtenerTodo();
        if (db.configEdificio) {
            document.getElementById('nombre').value = db.configEdificio.nombre;
            document.getElementById('direccion').value = db.configEdificio.direccion;
            document.getElementById('pisos').value = db.configEdificio.pisos;
        }

        document.getElementById('form-edificio').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = obtenerTodo();
            data.configEdificio = {
                nombre: document.getElementById('nombre').value,
                direccion: document.getElementById('direccion').value,
                pisos: document.getElementById('pisos').value
            };
            guardarTodo(data);
            alert("¡Edificio actualizado!");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
